# see https://docs.searxng.org/admin/settings/settings.html#settings-use-default-settings
use_default_settings: true
server:
  # base_url is defined in the SEARXNG_BASE_URL environment variable, see .env and docker-compose.yml
  secret_key: 009ca3516253540bc4196d21f000f0a95020360f34bd4746c1eabafddce0a050
  limiter: false  # enable this when running the instance for a public usage on the internet
  image_proxy: true
ui:
  static_use_hash: true
redis:
  url: redis://redis:6379/0
search:
  formats:
    - html
    - json
engines:
  # The default public engines are frequently throttled. Keep several
  # independently tested fallbacks active so a single CAPTCHA does not zero out
  # web research.
  - name: yandex
    disabled: false
  - name: presearch
    disabled: false
  - name: dogpile
    disabled: false
  - name: privacywall
    disabled: false
